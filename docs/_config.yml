# Jekyll configuration for just-the-docs theme
# https://just-the-docs.github.io/just-the-docs/

title: GoGPUtils
description: >-
  A collection of well-tested, idiomatic Go utilities for common programming tasks.
  Zero external dependencies for core utilities.

baseurl: "/GoGPUtils"
url: "https://alessiosavi.github.io"

# Use just-the-docs theme via remote_theme (GitHub Pages-compatible)
remote_theme: just-the-docs/just-the-docs@v0.8.2

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

# Color scheme
color_scheme: light

# Enable search
search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation in the sidebar
nav_external_links:
  - title: GitHub
    url: https://github.com/alessiosavi/GoGPUtils
  - title: GoDoc
    url: https://godoc.org/github.com/alessiosavi/GoGPUtils

# Auxiliary links (top right)
aux_links:
  "View on GitHub":
    - "https://github.com/alessiosavi/GoGPUtils"

# Footer content
footer_content: "Copyright &copy; 2024 Alessio Savi. Distributed under an MIT license."

# Mermaid support
mermaid:
  version: "10.9.0"

# Callouts support (just-the-docs >= 0.7.0)
callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  important:
    title: Important
    color: green
  danger:
    title: Danger
    color: red

# Exclude from processing
exclude:
  - "*.gemspec"
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"
  - "vendor"
  - "_site"
  - ".sass-cache"
  - ".jekyll-cache"
  - "graphify-out"
