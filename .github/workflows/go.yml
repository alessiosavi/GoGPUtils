name: Go
on: [ push ]
jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

      - name: Check out code into the Go module directory
        uses: actions/checkout@v5

      - name: Set up Go 1.24.11
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.11'
          cache: true
        id: go

      - name: Build
        run: go build -v .

      - name: Test
        run: go test -race -v ./...