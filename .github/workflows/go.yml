name: Go
on: [ push ]
jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

      - name: Check out code into the Go module directory
        uses: actions/checkout@v5

      - name: Set up Go 1.22.1
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.25.2'
          cache: true
        id: go

      - name: Build
        run: go build -v .

      - name: Test
        run: go test -race `go list ./... | grep -v "aws\|sftp\|http"`